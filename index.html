<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Senha Impossível</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div id="playerDisplay">👤</div>

  <div class="menu">
    <button onclick="toggleMenu()">⋮</button>
    <div id="dropdown" class="dropdown">
      <button onclick="goRanking()">🏆 Ranking</button>
    </div>
  </div>
</div>

<div class="container">

  <h1>Senha Impossível</h1>

  <div id="start">
    <input id="playerName" placeholder="Seu nome..." />
    <button onclick="startGame()">Começar</button>
  </div>

  <div id="game" style="display:none;">
    <input id="password" placeholder="Digite sua senha..." />
    <ul id="rules"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
